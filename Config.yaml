# ================= ОСНОВНЫЕ НАСТРОЙКИ =================
port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

# ================= СНИФФЕР И DNS =================
# Вытаскивает домены из трафика для проверки по блэклисту
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '+.lan'
    - '+.local'
  # Дефолтный DNS для резолва самих IP твоих прокси-серверов (чтобы подключаться к ним быстро)
  default-nameserver:
    - 77.88.8.8
  # Основной зашифрованный DNS, который не подменит провайдер (для проверки блэклиста)
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query


nameserver-policy:
    "+.ru": "77.88.8.8"
    "+.su": "77.88.8.8"
    "+.рф": "77.88.8.8"
    "+.yandex.ru": "77.88.8.8"
    "+.vk.com": "77.88.8.8"
    "+.ya.ru": "77.88.8.8"


# ================= 1. MAIN VLESS (ДВА ВАРИАНТА ПОДКЛЮЧЕНИЯ) =================
proxies:
  # 1.1 Прямое подключение к твоему серверу (ВСТАВИТЬ СВОИ ДАННЫЕ ВМЕСТО МИНУСОВ)
  - name: "Main-VLESS"
    type: vless
    server: -
    port: 443
    uuid: -
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: vk.com
    reality-opts:
      public-key: -
      short-id: -
    client-fingerprint: chrome

  # 1.2 Подключение через цепочку (СКОПИРОВАТЬ ТЕ ЖЕ ДАННЫЕ СЮДА)
  - name: "Main-VLESS-Chained"
    type: vless
    server: -
    port: 443
    uuid: -
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: vk.com
    reality-opts:
      public-key: -
      short-id: -
    client-fingerprint: chrome
    # МАГИЯ ЦЕПОЧКИ ЗДЕСЬ: этот параметр заставляет VLESS стучаться через белый сервер
    dialer-proxy: "Best-Whitelist-Proxy"


# ================= 2. ПОДПИСКИ (БЕЛЫЕ СЕРВЕРА) =================
proxy-providers:
  github-whitelist-subs:
    type: http
    url: "https://raw.githubusercontent.com/Oradep/UltimateProxy/refs/heads/main/vless_wl.txt"
    interval: 3600 
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300


# ================= 3. ЛОГИКА (БЕЗ УСТАРЕВШЕГО RELAY) =================
proxy-groups:
  # А. Выбираем лучший сервер из белого списка (по пингу)
  - name: "Best-Whitelist-Proxy"
    type: url-test
    use:
      - github-whitelist-subs
    url: http://www.gstatic.com/generate_204
    interval: 300 
    tolerance: 50 

  # Б. Умный переключатель: Прямо или через цепочку
  - name: "Smart-Routing"
    type: fallback
    proxies:
      - "Main-VLESS"          
      - "Main-VLESS-Chained"  
    url: http://www.gstatic.com/generate_204
    interval: 15 

# ================= 4. БЛЭКЛИСТЫ =================
rule-providers:
  sanmai-blacklist:
    type: http
    behavior: classical
    format: yaml   
    url: "https://raw.githubusercontent.com/Oradep/CopperProxy/refs/heads/main/blacklist_mihomo.yaml"
    interval: 86400 


# ================= 5. МАРШРУТИЗАЦИЯ =================
rules:
  # 1. Локалка идет напрямую мимо всего
  - GEOIP,lan,DIRECT,no-resolve
  - GEOSITE,private,DIRECT

  # 2. Проверка по блэклисту. Если совпало -> в умный рутинг
  - RULE-SET,sanmai-blacklist,Smart-Routing

  # 3. Всё остальное напрямую (включая весь рунет)
  - MATCH,DIRECT