#!name=📶 WiFi (Черный список)
#!desc=Маршрутизация: Все сайты напрямую, кроме заблокированных

# ================= ПЕРЕМЕННЫЕ =================
x-variables:
  personal_sub: &personal_sub "https://..." # <<< ВАША ССЫЛКА НА СВОЙ СЕРВЕР
  blacklist_url: &blacklist_url "https://raw.githubusercontent.com/Oradep/CopperProxy/refs/heads/main/blacklist_mihomo.yaml"

# ================= УДОБСТВО (UX) =================
profile:
  store-selected: true
  store-fake-ip: true

# ================= ОСНОВНЫЕ НАСТРОЙКИ =================
port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
udp: true

tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53"]
  auto-route: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 8.8.8.8
    - 1.1.1.1
  nameserver-policy:
    "+.ru": "77.88.8.8"
    "+.рф": "77.88.8.8"

# ================= ПРОВАЙДЕРЫ ПРОКСИ =================
proxy-providers:
  main-personal-sub:
    type: http
    url: *personal_sub
    interval: 3600
    health-check:
      enable: true
      url: "http://connectivitycheck.gstatic.com/generate_204"
      expected-status: 204
      interval: 30

# ================= ГРУППЫ ПРОКСИ =================
proxy-groups:
  - name: "🛡️ CopperProxy (Основной)"
    type: fallback
    icon: "https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/shield.svg"
    use:
      - main-personal-sub
    url: "http://connectivitycheck.gstatic.com/generate_204"
    expected-status: 204
    interval: 30

# ================= ПРАВИЛА (ЧЕРНЫЙ СПИСОК) =================
rule-providers:
  personal-blacklist:
    type: http
    behavior: classical
    format: yaml   
    url: *blacklist_url
    interval: 86400 

  # Бинарная база РКН (Не тормозит телефон)
  rkn-ip-blocked:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://raw.githubusercontent.com/runetfreedom/russia-blocked-geoip/release/mrs/ru-blocked.mrs"
    interval: 43200

# ================= МАРШРУТИЗАЦИЯ =================
rules:
  - GEOIP,lan,DIRECT,no-resolve
  - GEOSITE,private,DIRECT

  # 1. Запрет UDP для YouTube/Meta (чтобы не тормозило из-за QUIC)
  - AND,((NETWORK,UDP),(DST-PORT,443),(GEOSITE,youtube,google,meta,instagram)),REJECT

  # 2. Служебные домены
  - DOMAIN-KEYWORD,github,🛡️ CopperProxy (Основной)

  # 3. Мессенджеры и соцсети
  - GEOSITE,discord,🛡️ CopperProxy (Основной)
  - GEOSITE,telegram,🛡️ CopperProxy (Основной)
  - GEOSITE,twitter,🛡️ CopperProxy (Основной)
  - GEOIP,telegram,🛡️ CopperProxy (Основной)
  - GEOIP,twitter,🛡️ CopperProxy (Основной)

  # 4. ВАШ ЛИЧНЫЙ ЧЕРНЫЙ СПИСОК
  - RULE-SET,personal-blacklist,🛡️ CopperProxy (Основной)

  # 5. БАЗА РОСКОМНАДЗОРА
  - RULE-SET,rkn-ip-blocked,🛡️ CopperProxy (Основной)

  # 6. ВСЁ ОСТАЛЬНОЕ -> НАПРЯМУЮ
  - MATCH,DIRECT